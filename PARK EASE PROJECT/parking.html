<!DOCTYPE html>
<html>
<head>
<title>Parking Service</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<h2>Parking Service</h2>

<div class="service-container">
    <div class="service-card">
        <h2>Parking Service</h2>

        <form id="parkingForm">
            <label>Parking Hours</label>
            <input type="number" id="parkingHours" required>

            <label>Plan</label>
            <select id="parkingPlan">
                <option value="5">Standard - shs.2000/hr</option>
                <option value="8">Premium Covered - shs.5000/hr</option>
            </select>

            <button type="submit">Confirm Payment</button>
        </form>

        <div class="result-box" id="parkingResult"></div>
    </div>
</div>
<!-- <script src="services.js"></script>
<script src="auth2.js"></script> -->
<script src="auth.js"></script>
<script src="core.js"></script>
<script src="services.js"></script>
</body>
</html>
