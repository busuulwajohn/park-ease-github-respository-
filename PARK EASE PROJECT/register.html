<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ParkEase | Register</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="register.css">
</head>

<body>

<div class="register-container">
<div class="register-card">

<h2>Create Account</h2>

<form id="registerForm">

<input type="text" id="fullName" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="text" id="phone" placeholder="+2567XXXXXXXX" required>

<input type="text" id="plate" placeholder="Membership ID (e.g MEM xxxW)" required>

<input type="password" id="password" placeholder="Strong Password" required>

<button type="submit">Create Account</button>

</form>

<a href="index.html">Back to Login</a>

</div>
</div>
<!-- <script src="dashboard.js"></script> -->
<script src="auth2.js"></script>
<script src="auth.js"></script>
</body>
</html>
